---
- hosts: all
  tasks:
     - name: Print Hello World
       ansible.builtin.debug:
          msg: "Hello World"

     - name: Install python3-rpm on managed host
       ansible.builtin.package:
          name: python3-rpm
          state: present

     - name: Install python3-rpm
       ansible.builtin.command: microdnf install python3-rpm

   
